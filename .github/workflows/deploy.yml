name: Deploy Knowledge Garden to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 让 GITHUB_TOKEN 有写 Pages 的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 防止并发部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install markdown pygments

      - name: Build book.html
        run: |
          python build_reader.py
          # 验证产物
          test -f index.html || (echo "::error::index.html not generated" && exit 1)
          echo "✓ Built index.html ($(wc -c < index.html) bytes)"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Status
        if: success()
        run: |
          echo "🚀 Deployed to ${{ steps.deployment.outputs.page_url }}"
          echo "📚 Visit your knowledge garden!"